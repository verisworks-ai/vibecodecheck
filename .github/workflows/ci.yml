name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  security:
    uses: verisworks-ai/.github/.github/workflows/security-baseline.yml@main
    with:
      language: node

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Test
        run: node --test

      - name: Dependency audit
        run: npm audit --audit-level=high

      - name: Score sum assertion
        run: |
          node -e "
            import('./src/audit.js').then(m => {
              const cats = [25, 25, 20, 15, 15];
              const sum = cats.reduce((a,b) => a+b, 0);
              if (sum !== 100) { console.error('maxScore sum !== 100:', sum); process.exit(1); }
              console.log('maxScore sum:', sum, '✓');
            });
          "
